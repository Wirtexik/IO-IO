<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Book Exchange - Test API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Instant Book Exchange</h1>
        <p>Wersja demonstracyjna - Test połączenia z serwerem</p>

        <button onclick="fetchBooks()">Pobierz półkę z książkami</button>

        <div id="statusBox" style="display: none; margin-top: 20px; font-weight: bold; line-height: 1.8;">
            <div id="serverStatus"></div>
            <div id="dbStatus"></div>
        </div>
        
        <table id="booksTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tytuł</th>
                    <th>Autor</th>
                    <th>Kategoria</th>
                    <th>Stan</th>
                    <th>Ilość</th>
                </tr>
            </thead>
            <tbody id="booksBody">
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
